<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fintez - Maliyyə Xidmətləri</title>
    <style>
        body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f4f7f6; text-align: center; }
        .container { padding: 20px; }
        .btn { display: inline-block; padding: 15px 25px; margin: 10px; border-radius: 8px; text-decoration: none; color: white; font-weight: bold; }
        .ios { background-color: #000; }
        .android { background-color: #3DDC84; color: #000; }
    </style>
    <script type="text/javascript">
        window.onload = function() {
            var userAgent = navigator.userAgent || navigator.vendor || window.opera;
            
            var iosUrl = "https://apps.apple.com/az/app/fintez-maliyyə-xidmətləri/id6757491923";
            var androidUrl = "https://play.google.com/store/apps/details?id=com.septem.fintezMobile";

            if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
                window.location.replace(iosUrl);
            } else if (/android/i.test(userAgent)) {
                window.location.replace(androidUrl);
            }
            // Əgər cihaz tanınmazsa, aşağıdakı HTML görünəcək
        };
    </script>
</head>
<body>
    <div class="container">
        <h2>Fintez Tətbiqini Yükləyin</h2>
        <p>Cihazınıza uyğun mağazanı seçin:</p>
        <a href="https://apps.apple.com/az/app/fintez-maliyyə-xidmətləri/id6757491923" class="btn ios">App Store</a>
        <a href="https://play.google.com/store/apps/details?id=com.septem.fintezMobile" class="btn android">Google Play</a>
    </div>
</body>
</html>
